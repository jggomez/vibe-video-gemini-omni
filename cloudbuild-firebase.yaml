# Cloud Build pipeline — Firebase Hosting deploy
# Triggered after backend deploy, or manually for frontend-only changes.
#
# Requires: FIREBASE_TOKEN stored in Secret Manager as "FIREBASE_TOKEN"
# Get token via: npx -y firebase-tools@latest login:ci
#
# Substitutions:
#   _REGION : GCP region (default: us-central1)

substitutions:
  _REGION: us-central1

steps:
  # ── Step 1: Install Firebase Tools and deploy ───────────────────────────────
  - name: node:20-slim
    id: firebase-deploy
    entrypoint: bash
    args:
      - -c
      - |
        npm install -g firebase-tools@latest
        firebase deploy --only hosting \
          --project $PROJECT_ID \
          --token $$FIREBASE_TOKEN \
          --non-interactive
    secretEnv:
      - FIREBASE_TOKEN

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/FIREBASE_TOKEN/versions/latest
      env: FIREBASE_TOKEN

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_STANDARD_2

timeout: 600s
