# Cloud Build pipeline — Vibe Video Studio
# Triggered on: git push to main branch
#
# Steps:
#   1. Build Docker image with layer cache from Artifact Registry
#   2. Push image to Artifact Registry
#   3. Deploy to Cloud Run (us-central1)
#
# Substitutions (set in Cloud Build trigger or passed via CLI):
#   _REGION      : GCP region          (default: us-central1)
#   _SERVICE     : Cloud Run service   (default: vibe-video-studio)
#   _REPO        : Artifact Registry repo name (default: vibe-video-studio)

substitutions:
  _REGION: us-central1
  _SERVICE: vibe-video-studio
  _REPO: vibe-video-studio

steps:
  # ── Step 1: Build container image ──────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
      # Use Artifact Registry cache for faster builds
      - --cache-from
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
      - --build-arg
      - BUILDKIT_INLINE_CACHE=1
      - .
    env:
      - DOCKER_BUILDKIT=1

  # ── Step 2: Push image to Artifact Registry ─────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-sha
    waitFor: [build]
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA

  - name: gcr.io/cloud-builders/docker
    id: push-latest
    waitFor: [build]
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest

  # ── Step 3: Deploy to Cloud Run ─────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    waitFor: [push-sha]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --service-account
      - vibe-video-sa@$PROJECT_ID.iam.gserviceaccount.com
      - --set-env-vars
      - ^;^LOGS_BUCKET_NAME=videos-gemini-omni;GOOGLE_CLOUD_PROJECT=$PROJECT_ID;ALLOW_ORIGINS=https://$PROJECT_ID.web.app,https://$PROJECT_ID.firebaseapp.com
      - --allow-unauthenticated
      - --min-instances
      - "0"
      - --max-instances
      - "10"
      - --memory
      - 2Gi
      - --cpu
      - "2"
      - --timeout
      - 300s
      - --concurrency
      - "80"
      - --port
      - "8080"

  # ── Step 4: Ensure public (unauthenticated) access IAM binding ───────────────
  # Explicitly set allUsers invoker after deploy to avoid the IAM warning
  # allowExitCodes: [0,1] prevents build failure if binding already exists
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: set-iam
    waitFor: [deploy]
    allowExitCodes: [0, 1]
    entrypoint: gcloud
    args:
      - beta
      - run
      - services
      - add-iam-policy-binding
      - ${_SERVICE}
      - --region=${_REGION}
      - --member=allUsers
      - --role=roles/run.invoker

# Store images in Artifact Registry
images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  dynamic_substitutions: true

timeout: 1200s
